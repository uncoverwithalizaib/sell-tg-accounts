<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>My Orders</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div id="app" style="display:flex;flex-direction:column;min-height:100vh;">

  <!-- Search row -->
  <div class="search-row">
    <input
      type="text"
      class="search-input"
      id="searchInput"
      placeholder="Search phone number"
      autocomplete="off"
      inputmode="tel"
    >
    <button class="filter-btn" aria-label="Filter">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
           stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="21" y1="6"  x2="3" y2="6"/>
        <line x1="15" y1="12" x2="9" y2="12"/>
        <line x1="18" y1="18" x2="6" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Tabs -->
  <div class="tabs-wrap">
    <div class="tabs">
      <div class="tab active" data-tab="pending">Pending</div>
      <div class="tab"        data-tab="accepted">Accepted</div>
      <div class="tab"        data-tab="rejected">Rejected</div>
    </div>
  </div>

  <!-- Account list -->
  <div class="account-list" id="accountList">
    <div class="loading-placeholder">Loading…</div>
  </div>

  <!-- Sticky bottom button -->
  <div class="bottom-btn-wrap">
    <button class="btn-primary" onclick="navigate('sell.html')">Sell Account</button>
  </div>

</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/orders.js"></script>
</body>
</html>
