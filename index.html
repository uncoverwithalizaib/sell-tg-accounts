<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TG Account Seller</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div id="app">

  <!-- Profile row -->
  <div class="profile-section">
    <div class="avatar">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none"
           stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
    <div class="profile-info">
      <div class="profile-name" id="profileName">Loading…</div>
      <div class="profile-meta" id="profileMeta"></div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Menu list -->
  <div class="menu-list">

    <!-- Withdraw Money -->
    <div class="menu-item" onclick="navigate('withdraw.html')">
      <div class="menu-icon icon-green">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none"
             stroke="#3bc45c" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="5" width="20" height="14" rx="2"/>
          <line x1="2" y1="10" x2="22" y2="10"/>
        </svg>
      </div>
      <div class="menu-content">
        <div class="menu-title">Withdraw Money</div>
        <div class="menu-subtitle" id="balanceSubtitle">0.00 USDT</div>
      </div>
      <div class="menu-right">
        <svg class="arrow-icon" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>
    </div>

    <!-- Sell Account -->
    <div class="menu-item" onclick="navigate('sell.html')">
      <div class="menu-icon icon-blue">
        <!-- Telegram paper-plane logo -->
        <svg viewBox="0 0 24 24" width="22" height="22" fill="#4a9eda">
          <path d="M21.198 2.433a2.242 2.242 0 0 0-1.022.215l-16.5 6.5a2.25 2.25 0 0 0 .126 4.237l3.785 1.263 1.263 3.785a2.25 2.25 0 0 0 4.237.126l6.5-16.5a2.25 2.25 0 0 0-2.389-2.626zm-7.02 14.53l-1.112-3.336 3.947-3.947a.75.75 0 0 0-1.06-1.06L12.006 12.567 8.67 11.456l9.892-3.9-4.384 9.407z"/>
        </svg>
      </div>
      <div class="menu-content">
        <div class="menu-title">Sell Account</div>
        <div class="menu-subtitle" id="sellSubtitle">0 sold</div>
      </div>
      <div class="menu-right">
        <span class="badge badge-available">AVAILABLE</span>
        <svg class="arrow-icon" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>
    </div>

    <!-- Orders -->
    <div class="menu-item" onclick="navigate('orders.html')">
      <div class="menu-icon icon-red">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none"
             stroke="#e04848" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>
      <div class="menu-content">
        <div class="menu-title">Orders</div>
        <div class="menu-subtitle" id="ordersSubtitle">0</div>
      </div>
      <div class="menu-right">
        <svg class="arrow-icon" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>
    </div>

    <!-- Channel -->
    <div class="menu-item" id="channelItem">
      <div class="menu-icon icon-orange">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none"
             stroke="#e09030" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8a5 5 0 0 1 0 8"/>
          <path d="M14 3.23A9 9 0 0 1 14 20.77"/>
          <polyline points="6 15 2 15 2 9 6 9"/>
          <polygon points="6 15 13 20 13 4 6 9"/>
        </svg>
      </div>
      <div class="menu-content">
        <div class="menu-title">Channel</div>
        <div class="menu-subtitle">Check our channel for latest updates</div>
      </div>
      <div class="menu-right">
        <svg class="arrow-icon" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>
    </div>

  </div><!-- /menu-list -->

  <div class="version" id="versionText">v1.0.0</div>

</div><!-- /#app -->

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/home.js"></script>
</body>
</html>
